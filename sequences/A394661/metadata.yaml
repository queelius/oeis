notes: >
  Triangle read by rows: T(n,k) is the number of prime knots with crossing
  number n and three-genus (Seifert genus) k, for n >= 3 and
  1 <= k <= floor((n-1)/2). Row sums equal A002863 (prime knots by crossing
  number): 1,1,2,3,7,21,49,165,552 for n=3..11.

  KnotInfo provenance: counts derive from the KnotInfo table of knot
  invariants (Livingston-Moore), accessed in the source repo via
  src/knot_invariants.py using the spherogram package (Rolfsen table c<=10,
  Hoste-Thistlethwaite c=11) with three-genus from knot_floer_homology (HFK).
  The committed data/catalog.json is the machine-readable snapshot;
  reproduce.py recomputes the full triangle from it with no external package
  dependency. The genus-by-crossing distribution agrees with KnotInfo at
  every n=3..11 (unlike the |signature| column, which has a known c=11
  spherogram labeling artifact; see A395644 notes).

  Convention: the Perko pair (10_161 = 10_162; Perko 1974) is counted once;
  knots are counted as distinct unoriented prime knots up to mirror image,
  following the KnotInfo enumeration.
