validated: true
notes: >
  Bivariate refinement of the max-tail-length (rho-height) distribution of
  functional graphs by the number of cyclic points. Proved bivariate EGF
  (Theorem A, Flajolet-Sedgewick markings: SEQ of u-marked tree-slots). Both
  marginals are classical OEIS: sum over c = A216242 (Critzer; max tail length),
  sum over t = A066324 (endofunctions by cyclic points, closed form
  C(n,c) c! c n^(n-c-1) for c<n, n! for c=n); the t=1 slice is A199673. The full
  joint triangle was NOT found in OEIS (searched Jun 2026) and is a submission
  candidate (keyword nonn,tabf). DATA is the full-square flattening for n=1..6
  (outer t=0..n-1, inner c=1..n, explicit zeros; 91 terms). reproduce.py
  recomputes B via the EGF and checks it cell-by-cell against brute force over
  all n^n maps (n=1..6), verifies both marginals (A216242 via
  src/max_tail_length.distribution_triangle, A066324 via cyclic_points_marginal),
  and confirms the flattened DATA. A companion joint Bm(n,t,m) by components
  (marginal A060281) exists but is not the primary submission.
