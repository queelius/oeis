id: max-tail-bivariate
title: "Triangle of triangles B(n,t,c): number of functions f:{1..n}->{1..n} whose functional graph has max tail length (rho-height) exactly t and exactly c cyclic points (read by rows, full-square)"
role: authored
status: candidate
domain: combinatorics
offset: 1
data: "1,0,2,2,0,0,0,6,3,12,0,6,0,0,0,0,0,24,4,48,72,0,36,48,0,0,24,0,0,0,0,0,0,0,120,5,160,540,480,0,200,600,360,0,0,300,240,0,0,0,120,0,0,0,0,0,0,0,0,0,720,6,480,3240,5760,3600,0,1170,6000,7560,2880,0,0,3360,5040,2160,0,0,0,2520,1440,0,0,0,0,720,0,0,0,0,0"
formula: "B(n,t,c) = n! [x^n u^c] ( 1/(1 - u e_t(x)) - 1/(1 - u e_{t-1}(x)) ), where e_t is the e.g.f. of rooted trees of height <= t: e_0 = x, e_t = x exp(e_{t-1}), e_{-1} = 0."
source_repo: open-problems
