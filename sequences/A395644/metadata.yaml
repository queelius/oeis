keywords: [nonn, hard, more]
notes: >
  a(n) = number of fibered prime knots with n crossings, n >= 3.

  KnotInfo provenance: the published sequence was authored from the canonical
  KnotInfo database (Livingston-Moore), counting prime knots whose `fibered`
  flag is set, by crossing number, for n=3..13, counted up to mirror image
  with the Perko pair (10_161 = 10_162) counted once.

  Scope of the committed reproduction: the snapshot data/catalog.json was
  built in the source repo via spherogram + knot_floer_homology and covers
  only c<=11, so it can recompute a(3)..a(11) but NOT a(12)=873 (2176 knots)
  or a(13)=4151 (9988 knots); those tail terms depend on the KnotInfo
  database directly and are outside the committed data.

  c=11 anomaly (handled in reproduce.py): for n=3..10 the catalog matches the
  published values exactly (105/105 KnotInfo per-knot cross-checks in the
  source repo). At n=11 the raw catalog gives 257, one MORE than the
  published 256: per c11-anomaly-investigation.md, spherogram's c=11 table
  includes BOTH chiralities of the knot KnotInfo records once as 11n_128
  (our 11_376 and 11_449, mirror images, both fibered) while omitting one
  chirality of another knot, keeping the total at 552 = A002863(11) by
  coincidental cancellation but inflating the fibered column by one. Counting
  up to mirror image (the KnotInfo/OEIS convention) removes the duplicated
  fibered chiral knot, recovering a(11)=256. reproduce.py applies this
  documented mirror-deduplication, then asserts an exact match to the
  published prefix a(3..11).
