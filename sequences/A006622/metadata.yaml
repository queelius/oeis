notes: >
  Classical OEIS sequence; this project added a(9)=61 (z(9,10;3,4)=60, published
  via Michel Marcus Mar 22 2026) and proposed a(10)=73 (z(10,11;3,4)=72) Jun 5
  2026, proved by a SAT witness (lower bound) plus a double-lex symmetry-broken
  UNSAT (src/zarankiewicz_symbreak.py, 1633 s) for the upper bound. Convention:
  project computes z = a - 1. reproduce.py fast-recomputes z(n,n+1;3,4) by MaxSAT
  (RC2) for n=3..5, validates the published terms (n=3..9) against the module's
  SAT-proven KNOWN_Z_3_4_RECT1 table, and cites a(10)=73 from the in-review
  submission/UNSAT proof. DATA shown is a(3..10).
