id: A006622
title: "k_{3,4}(n,n+1) = z(n,n+1;3,4) + 1: related to maximum 1s in an n X (n+1) 0-1 matrix with no 3 X 4 all-ones submatrix"
role: extended
status: published
domain: extremal-graph-theory
offset: 3
data: "12, 18, 26, 33, 41, 51, 61, 73"
formula: "a(n) = z(n,n+1;3,4) + 1, where z is the Zarankiewicz number."
