id: A006625
title: "k_{3,4}(n,n+2) = z(n,n+2;3,4) + 1: related to maximum 1s in an n X (n+2) 0-1 matrix with no 3 X 4 all-ones submatrix"
role: extended
status: published
domain: extremal-graph-theory
